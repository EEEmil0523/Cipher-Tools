<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cipher Tool - Alive Eyes</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #00ff00;
            --box-bg: #111;
            --btn-bg: #222;
            --border-color: #00ff00;
            --neon-glow: 0 0 20px #00ff00, 0 0 40px #00ff00;
        }

        .light-mode {
            --bg-color: #ffffff;
            --text-color: #800080;
            --box-bg: #f9f9f9;
            --btn-bg: #ffffff;
            --border-color: #800080;
            --neon-glow: 0 0 20px #800080, 0 0 40px #800080;
        }

        * { 
            box-sizing: border-box; 
            transition: background 0.4s, color 0.4s; 
            touch-action: manipulation; 
        }

        body, html { 
            background: var(--bg-color); color: var(--text-color); 
            font-family: 'Segoe UI', monospace; margin: 0; padding: 0;
            width: 100%; height: 100%;
        }

        /* ===== 頂部固定眼睛區 (整合按鈕) ===== */
        #eye-header {
            position: fixed; top: 0; left: 0; width: 100%;
            height: 220px; background: var(--bg-color);
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 15px 20px; z-index: 1000;
            border-bottom: 2px solid var(--border-color);
            transition: height 0.5s ease;
        }

        #eye-header.compact { height: 140px; }

        .eyes-container {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            display: flex; gap: 40px; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: gap 0.5s ease;
        }

        /* 縮小版時拉近眼睛距離，避免擋到兩側按鈕 */
        #eye-header.compact .eyes-container { gap: 15px; }

        .eye {
            width: 160px; height: 160px; 
            background: white; border-radius: 50%; 
            position: relative; overflow: hidden;
            border: 4px solid var(--border-color);
            box-shadow: var(--neon-glow);
            transition: all 0.5s ease;
        }
        
        #eye-header.compact .eye { width: 100px; height: 100px; }

        .pupil {
            width: 100px; height: 100px; 
            background: black; border-radius: 50%; 
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out; 
        }
        
        #eye-header.compact .pupil { width: 60px; height: 60px; }

        /* 瞳孔反光 */
        .pupil::after {
            content: ''; width: 20px; height: 20px; 
            background: white; border-radius: 50%; 
            position: absolute; top: 18px; left: 18px;
            transition: all 0.1s ease-out;
        }
        
        #eye-header.compact .pupil::after { width: 12px; height: 12px; top: 10px; left: 10px; }

        .eyelid {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-color);
            border-radius: 50%;
            transform: scaleY(0); transform-origin: top;
            animation: blink 5s infinite;
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(0); }
            92%, 95% { transform: scaleY(1); }
        }

        /* ===== UI 與排版 ===== */
        .icon-btn { 
            background: var(--bg-color); border: 2px solid var(--border-color); 
            color: var(--text-color); font-size: 1.5rem; 
            padding: 10px 20px; cursor: pointer; border-radius: 12px; font-weight: 900;
            box-shadow: var(--neon-glow); z-index: 1001;
        }

        #landing-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; cursor: pointer; transition: opacity 0.6s ease;
        }

        .enter-hint {
            margin-top: 250px; font-size: 2rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 5px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        #main-app { display: none; padding: 250px 20px 40px 20px; transition: padding-top 0.5s ease; }
        #eye-header.compact ~ #main-app { padding-top: 170px; } 

        .container { max-width: 800px; margin: auto; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        textarea { 
            width: 100%; background: var(--box-bg); 
            color: inherit; border: 3px solid var(--border-color); 
            padding: 15px; font-size: 1.6rem; border-radius: 15px; outline: none;
        }

        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 20px; margin-top: 25px; }

        button.tool-btn { 
            background: var(--btn-bg); color: var(--text-color); 
            border: 3px solid var(--border-color); padding: 18px; 
            font-size: 1.3rem; font-weight: bold; cursor: pointer; border-radius: 15px;
        }

        .result-box { 
            margin-top: 25px; white-space: pre-wrap; background: #000; color: #00ff00;
            padding: 20px; border: 2px solid var(--border-color);
            font-size: 1.3rem; border-radius: 10px; box-shadow: var(--neon-glow);
        }

        .sidebar {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 11000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.5s ease;
        }
        .sidebar.active { right: 0; }
        .sidebar-link { 
            display: block; color: var(--text-color); text-decoration: none; 
            font-size: 2.5rem; margin: 25px 0; font-weight: 900; text-align: center;
        }

        .footer { font-size: 3rem; font-weight: 900; text-align: center; margin-top: 50px; text-shadow: var(--neon-glow); }
        .neon-text { text-shadow: var(--neon-glow); }

        /* ===== 電腦版專屬放大設定 (Media Query) ===== */
        @media (min-width: 768px) {
            #eye-header { padding: 25px 40px; }
            .icon-btn { font-size: 2rem; padding: 12px 30px; }
            .container { max-width: 900px; }
            textarea { font-size: 2rem; padding: 25px; }
            button.tool-btn { font-size: 1.6rem; padding: 25px; }
            .result-box { font-size: 1.8rem; padding: 30px; }
            .sidebar-link { font-size: 3.5rem; margin: 40px 0; }
        }
    </style>
</head>
<body>

    <div id="eye-header">
        <button class="icon-btn" onclick="toggleTheme()">🌓</button>
        
        <div class="eyes-container" onclick="toggleEyeSize()" title="點擊切換大小">
            <div class="eye">
                <div class="pupil"></div>
                <div class="eyelid"></div>
            </div>
            <div class="eye">
                <div class="pupil"></div>
                <div class="eyelid"></div>
            </div>
        </div>

        <button class="icon-btn" onclick="toggleSidebar()">MENU</button>
    </div>

    <div id="landing-overlay" onclick="requestAndEnter()">
        <div class="enter-hint neon-text">Click to Enter</div>
        <div class="footer neon-text">承蔚老帥了</div>
    </div>

    <div id="main-app">
        <nav class="sidebar" id="sidebar">
            <button class="icon-btn" style="position:absolute; top:40px; right:40px;" onclick="toggleSidebar()">CLOSE</button>
            <a href="#" class="sidebar-link" onclick="showSection('classic')">Classical</a>
            <a href="#" class="sidebar-link" onclick="showSection('modern')">Modern</a>
            <a href="#" class="sidebar-link" onclick="showSection('fair')">竹商園遊會</a>
            <div class="footer neon-text">承蔚老帥了</div>
        </nav>

        <div id="main-content" class="container">
            <textarea id="input" rows="3" placeholder="Input text..."></textarea>
            <div id="section-classic">
                <div class="btn-grid">
                    <button class="tool-btn" onclick="runCaesar()">Caesar</button>
                    <button class="tool-btn" onclick="runAtbash()">Atbash</button>
                </div>
            </div>
            <div id="section-modern" style="display:none;">
                <div class="btn-grid">
                    <button class="tool-btn" onclick="runASCII()">ASCII</button>
                    <button class="tool-btn" onclick="runBase64()">Base64</button>
                    <button class="tool-btn" onclick="runHex()">Hex</button>
                    <button class="tool-btn" onclick="runBinary()">Binary</button>
                </div>
            </div>
            <div id="output" class="result-box">Waiting...</div>
            <div class="footer neon-text">承蔚老帥了</div>
        </div>

        <div id="fair-content" class="container" style="display:none;">
            <div style="text-align:center;">
                <div class="footer neon-text" style="font-size:3.5rem;">5/9 記得要來<br>綜二1 喔喔</div>
                <img src="67.gif" alt="67.gif" style="max-width:100%; border-radius:15px; border:4px solid var(--border-color); margin-top:20px;" onerror="this.style.display='none'">
                <br>
                <a href="https://www.instagram.com/hccvs_da21?igsh=MWdmNHp6aTdkbTAxaQ==" target="_blank" style="display:inline-block; margin-top:30px; padding:20px 40px; background:linear-gradient(45deg,#f09433,#bc1888); color:white; text-decoration:none; border-radius:50px; font-size:1.8rem; font-weight:bold;">快來看看吧</a>
                <div class="footer neon-text" style="margin-top:60px;">承蔚老帥了</div>
            </div>
        </div>
    </div>

    <script>
        const pupils = document.querySelectorAll('.pupil');

        function requestAndEnter() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('deviceorientation', handleGyro);
                });
            } else {
                window.addEventListener('deviceorientation', handleGyro);
            }

            document.getElementById('eye-header').classList.add('compact');
            document.getElementById('landing-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('landing-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                showSection('fair'); 
            }, 600);
        }

        // 點擊眼睛：在縮小與放大之間切換
        function toggleEyeSize() {
            document.getElementById('eye-header').classList.toggle('compact');
        }

        function updatePupilPosition(xOffset, yOffset) {
            pupils.forEach(pupil => {
                const eyeRect = pupil.parentElement.getBoundingClientRect();
                const pupilRect = pupil.getBoundingClientRect();
                
                const maxRadius = (eyeRect.width / 2) - (pupilRect.width / 2) - 4; 
                const distance = Math.hypot(xOffset, yOffset);
                
                let finalX = xOffset;
                let finalY = yOffset;

                if (distance > maxRadius) {
                    const ratio = maxRadius / distance;
                    finalX = xOffset * ratio;
                    finalY = yOffset * ratio;
                }

                pupil.style.transform = `translate(calc(-50% + ${finalX}px), calc(-50% + ${finalY}px))`;
            });
        }

        window.addEventListener('mousemove', (e) => {
            if (pupils.length === 0) return;
            const eyeRect = pupils[0].parentElement.getBoundingClientRect();
            const eyeCenterX = eyeRect.left + eyeRect.width / 2;
            const eyeCenterY = eyeRect.top + eyeRect.height / 2;
            
            const xOffset = (e.clientX - eyeCenterX) / 6;
            const yOffset = (e.clientY - eyeCenterY) / 6;
            
            updatePupilPosition(xOffset, yOffset);
        });

        function handleGyro(e) {
            const xOffset = e.gamma * 1.5; 
            const yOffset = (e.beta - 45) * 1.5; 
            updatePupilPosition(xOffset, yOffset);
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function showSection(type) {
            if (document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
            document.getElementById('main-content').style.display = (type === 'fair') ? 'none' : 'block';
            document.getElementById('fair-content').style.display = (type === 'fair') ? 'block' : 'none';
            if (type !== 'fair') {
                document.getElementById('section-classic').style.display = (type === 'classic') ? 'block' : 'none';
                document.getElementById('section-modern').style.display = (type === 'modern') ? 'block' : 'none';
            }
        }

        function runCaesar() {
            let s = document.getElementById('input').value;
            let res = "Result:\n";
            for (let i = 1; i < 26; i++) {
                res += i.toString().padStart(2, '0') + " | " + s.replace(/[a-zA-Z]/g, c => {
                    const b = c <= 'Z' ? 65 : 97;
                    return String.fromCharCode((c.charCodeAt(0) - b + i) % 26 + b);
                }) + "\n";
            }
            document.getElementById('output').innerText = res;
        }
        function runAtbash() {
            let s = document.getElementById('input').value;
            document.getElementById('output').innerText = "Result:\n" + s.replace(/[a-zA-Z]/g, c => {
                const b = c <= 'Z' ? 155 : 219; return String.fromCharCode(b - c.charCodeAt(0));
            });
        }
        function runASCII() {
            let s = document.getElementById('input').value.trim();
            try {
                let res = s.split(/\s+/).map(n => String.fromCharCode(parseInt(n))).join('');
                document.getElementById('output').innerText = "Result:\n" + res;
            } catch(e) { document.getElementById('output').innerText = "Error: Numbers only."; }
        }
        function runBase64() {
            try { document.getElementById('output').innerText = "Result:\n" + atob(document.getElementById('input').value.trim()); }
            catch(e) { document.getElementById('output').innerText = "Error: Invalid."; }
        }
        function runHex() {
            let s = document.getElementById('input').value.replace(/\s+/g, '');
            try {
                let res = ""; for (let i = 0; i < s.length; i += 2) res += String.fromCharCode(parseInt(s.substr(i, 2), 16));
                document.getElementById('output').innerText = "Result:\n" + res;
            } catch(e) { document.getElementById('output').innerText = "Error: Invalid."; }
        }
        function runBinary() {
            let s = document.getElementById('input').value.trim();
            try {
                let res = s.split(/\s+/).map(b => String.fromCharCode(parseInt(b, 2))).join('');
                document.getElementById('output').innerText = "Result:\n" + res;
            } catch(e) { document.getElementById('output').innerText = "Error: Use 0/1."; }
        }
    </script>
</body>
</html>
