<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cipher Tool - Pro</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #00ff00;
            --box-bg: #111;
            --btn-bg: #222;
            --border-color: #00ff00;
            --neon-glow: 0 0 15px #00ff00, 0 0 30px #00ff00;
        }

        .light-mode {
            --bg-color: #ffffff;
            --text-color: #800080;
            --box-bg: #f9f9f9;
            --btn-bg: #ffffff;
            --border-color: #800080;
            --neon-glow: 0 0 15px #800080, 0 0 30px #800080;
        }

        * { 
            box-sizing: border-box; 
            transition: background 0.4s, color 0.4s; 
            touch-action: manipulation; 
        }

        body, html { 
            background: var(--bg-color); color: var(--text-color); 
            font-family: 'Segoe UI', monospace; margin: 0; padding: 0;
            overflow-x: hidden; width: 100%; height: 100%;
        }

        /* 登陸頁面 (Landing Page) */
        #landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 0.8s ease, visibility 0.8s;
        }

        /* 靈動大眼睛 - 加大瞳孔 */
        .eyes-container { display: flex; gap: 40px; }
        .eye {
            width: 120px; height: 120px; background: #fff;
            border-radius: 50%; position: relative;
            border: 4px solid var(--border-color);
            box-shadow: var(--neon-glow); overflow: hidden;
        }
        .pupil {
            width: 65px; height: 65px; background: #000;
            border-radius: 50%; position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            /* 平滑滑動感核心 */
            transition: transform 0.15s cubic-bezier(0.2, 0.5, 0.1, 1);
        }

        .enter-hint {
            margin-top: 40px; font-size: 1.2rem; 
            text-transform: uppercase; letter-spacing: 3px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 主程式內容 */
        #main-app { display: none; padding: 20px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 15px; border-bottom: 2px solid var(--border-color);
        }

        .icon-btn { 
            background: none; border: 1px solid var(--border-color); 
            color: var(--text-color); font-size: 1.2rem; 
            padding: 8px 15px; cursor: pointer; border-radius: 8px; font-weight: bold;
        }

        .container { max-width: 800px; margin: auto; animation: slideUp 0.6s ease; padding-top: 20px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        textarea { 
            width: 100%; background: var(--box-bg); 
            color: inherit; border: 2px solid var(--border-color); 
            padding: 15px; font-size: 1.4rem; border-radius: 10px;
            margin-top: 20px; outline: none;
        }

        .btn-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); 
            gap: 15px; margin-top: 20px; 
        }

        button.tool-btn { 
            background: var(--btn-bg); color: var(--text-color); 
            border: 2px solid var(--border-color); padding: 15px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 12px;
        }
        button.tool-btn:hover { background: var(--text-color); color: var(--bg-color); box-shadow: var(--neon-glow); }

        .result-box { 
            margin-top: 25px; white-space: pre-wrap; 
            background: #000; color: #00ff00;
            padding: 20px; border: 2px solid var(--border-color);
            font-size: 1.2rem; border-radius: 10px; box-shadow: var(--neon-glow);
        }
        .light-mode .result-box { background: #f0f0f0; color: #800080; }

        .sidebar {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: var(--box-bg); border-left: 3px solid var(--border-color);
            z-index: 1000; padding: 60px 20px; transition: 0.5s ease;
        }
        .sidebar.active { right: 0; }
        .sidebar-link {
            display: block; color: var(--text-color); text-decoration: none;
            font-size: 1.3rem; margin: 20px 0; font-weight: bold; padding: 10px;
        }

        .fair-container { text-align: center; padding: 20px; }
        .ig-link {
            display: inline-block; margin-top: 20px; padding: 15px 30px;
            background: linear-gradient(45deg, #f09433, #bc1888);
            color: white; text-decoration: none; border-radius: 50px; font-weight: bold;
        }

        .footer { font-size: 2.5rem; font-weight: 900; text-align: center; margin-top: 40px; text-shadow: var(--neon-glow); }
        .neon-text { text-shadow: var(--neon-glow); }
    </style>
</head>
<body>

    <div id="landing-page" onclick="enterApp()">
        <div class="eyes-container">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
        </div>
        <div class="enter-hint neon-text">Click to Enter</div>
        <div class="footer neon-text" style="position:fixed; bottom:30px;">承蔚老帥了</div>
    </div>

    <div id="main-app">
        <header>
            <h1 id="header-title" class="neon-text">Cipher Tool</h1>
            <div class="nav-controls">
                <button class="icon-btn" onclick="toggleTheme()">🌓</button>
                <button class="icon-btn" onclick="toggleSidebar()">Menu</button>
            </div>
        </header>

        <nav class="sidebar" id="sidebar">
            <button class="icon-btn" style="position:absolute; top:15px; left:15px;" onclick="toggleSidebar()">Close</button>
            <a href="#" class="sidebar-link" onclick="showSection('classic')">Classical Ciphers</a>
            <a href="#" class="sidebar-link" onclick="showSection('modern')">Modern Ciphers</a>
            <a href="#" class="sidebar-link" onclick="showSection('fair')">竹商園遊會</a>
        </nav>

        <div id="main-content" class="container">
            <textarea id="input" rows="4" placeholder="Input text here..."></textarea>
            
            <div id="section-classic">
                <h2>Classical</h2>
                <div class="btn-grid">
                    <button class="tool-btn" onclick="runCaesar()">Caesar</button>
                    <button class="tool-btn" onclick="runAtbash()">Atbash</button>
                </div>
            </div>

            <div id="section-modern" style="display:none;">
                <h2>Modern</h2>
                <div class="btn-grid">
                    <button class="tool-btn" onclick="runASCII()">ASCII</button>
                    <button class="tool-btn" onclick="runBase64()">Base64</button>
                    <button class="tool-btn" onclick="runHex()">Hex</button>
                    <button class="tool-btn" onclick="runBinary()">Binary</button>
                </div>
            </div>

            <div id="output" class="result-box">Waiting for command...</div>
            <div class="footer neon-text">承蔚老帥了</div>
        </div>

        <div id="fair-content" class="container" style="display:none;">
            <div class="fair-container">
                <div class="footer neon-text" style="font-size:3rem; margin-bottom:20px;">5/9 記得要來<br>綜二1 喔喔</div>
                <img src="67.gif" alt="67.gif" style="max-width:100%; border-radius:10px; border:2px solid var(--border-color); box-shadow:var(--neon-glow);" onerror="this.style.display='none'">
                <br>
                <a href="https://www.instagram.com/hccvs_da21?igsh=MWdmNHp6aTdkbTAxaQ==" target="_blank" class="ig-link">快來看看吧</a>
                <div class="footer neon-text" style="margin-top:60px;">承蔚老帥了</div>
            </div>
        </div>
    </div>

    <script>
        const pupils = document.querySelectorAll('.pupil');

        // --- 進入 App 邏輯 ---
        function enterApp() {
            // 請求陀螺儀權限 (iOS 13+ 需要使用者點擊觸發)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            // 動畫切換
            document.getElementById('landing-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('landing-page').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                // 預設進入園遊會介面
                showSection('fair');
            }, 800);
        }

        // --- 眼睛跟隨邏輯 ---
        // 電腦版：隨鼠標
        window.addEventListener('mousemove', (e) => {
            pupils.forEach(pupil => {
                const rect = pupil.parentElement.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const distance = Math.min(rect.width / 4, Math.hypot(e.clientX - eyeX, e.clientY - eyeY) / 10);
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                pupil.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            });
        });

        // 手機版：隨陀螺儀
        function handleOrientation(e) {
            const xOffset = Math.min(Math.max(e.gamma / 2, -18), 18);
            const yOffset = Math.min(Math.max((e.beta - 45) / 2, -18), 18);
            pupils.forEach(pupil => {
                pupil.style.transform = `translate(calc(-50% + ${xOffset}px), calc(-50% + ${yOffset}px))`;
            });
        }

        // --- UI 控制 ---
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function showSection(type) {
            if (document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
            
            document.getElementById('main-content').style.display = (type === 'fair') ? 'none' : 'block';
            document.getElementById('fair-content').style.display = (type === 'fair') ? 'block' : 'none';
            
            if (type !== 'fair') {
                document.getElementById('section-classic').style.display = (type === 'classic') ? 'block' : 'none';
                document.getElementById('section-modern').style.display = (type === 'modern') ? 'block' : 'none';
                document.getElementById('header-title').innerText = 'Cipher Tool';
            } else {
                document.getElementById('header-title').innerText = '竹商園遊會';
            }
        }

        // --- 密碼工具邏輯 (保持不變) ---
        function runCaesar() {
            let s = document.getElementById('input').value;
            let res = "Caesar Brute Force:\n";
            for (let i = 1; i < 26; i++) {
                res += i.toString().padStart(2, '0') + " | " + s.replace(/[a-zA-Z]/g, c => {
                    const b = c <= 'Z' ? 65 : 97;
                    return String.fromCharCode((c.charCodeAt(0) - b + i) % 26 + b);
                }) + "\n";
            }
            document.getElementById('output').innerText = res;
        }
        function runAtbash() {
            let s = document.getElementById('input').value;
            document.getElementById('output').innerText = "Atbash Result:\n" + s.replace(/[a-zA-Z]/g, c => {
                const b = c <= 'Z' ? 65 + 90 : 97 + 122; return String.fromCharCode(b - c.charCodeAt(0));
            });
        }
        function runASCII() {
            let s = document.getElementById('input').value.trim();
            try {
                let res = s.split(/\s+/).map(n => String.fromCharCode(parseInt(n))).join('');
                document.getElementById('output').innerText = "ASCII Result:\n" + res;
            } catch(e) { document.getElementById('output').innerText = "Error: Use decimal numbers."; }
        }
        function runBase64() {
            try { document.getElementById('output').innerText = "Base64 Result:\n" + atob(document.getElementById('input').value.trim()); }
            catch(e) { document.getElementById('output').innerText = "Error: Invalid Base64."; }
        }
        function runHex() {
            let s = document.getElementById('input').value.replace(/\s+/g, '');
            try {
                let res = ""; for (let i = 0; i < s.length; i += 2) res += String.fromCharCode(parseInt(s.substr(i, 2), 16));
                document.getElementById('output').innerText = "Hex Result:\n" + res;
            } catch(e) { document.getElementById('output').innerText = "Error: Invalid Hex."; }
        }
        function runBinary() {
            let s = document.getElementById('input').value.trim();
            try {
                let res = s.split(/\s+/).map(b => String.fromCharCode(parseInt(b, 2))).join('');
                document.getElementById('output').innerText = "Binary Result:\n" + res;
            } catch(e) { document.getElementById('output').innerText = "Error: Use binary."; }
        }
    </script>
</body>
</html>
