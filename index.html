<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Tool - 承蔚老帥了</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #00ff00;
            --box-bg: #1e1e1e;
            --btn-bg: #333;
            --border-color: #00ff00;
            --shadow: 0 0 10px #00ff00;
        }

        .light-mode {
            --bg-color: #ffffff;
            --text-color: #800080; /* 紫色 */
            --box-bg: #f5f5f5;
            --btn-bg: #ffffff;
            --border-color: #800080;
            --shadow: 0 0 10px rgba(128, 0, 128, 0.4);
        }

        * { box-sizing: border-box; transition: 0.3s; }
        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', monospace; 
            margin: 0; padding: 20px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 15px; border-bottom: 2px solid var(--border-color);
        }

        .icon-btn { 
            background: none; border: 1px solid var(--border-color); 
            color: var(--text-color); font-size: 1.5rem; 
            padding: 8px 12px; cursor: pointer; border-radius: 8px;
        }

        .container { max-width: 800px; margin: auto; animation: fadeInUp 0.8s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        textarea { 
            width: 100%; background: var(--box-bg); 
            color: inherit; border: 2px solid var(--border-color); 
            padding: 15px; font-size: 1.4rem; border-radius: 10px;
            margin-top: 20px; outline: none;
        }

        h2 { margin-top: 25px; border-left: 5px solid var(--border-color); padding-left: 10px; }

        .btn-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 12px; margin-top: 15px; 
        }

        button.tool-btn { 
            background: var(--btn-bg); color: var(--text-color); 
            border: 2px solid var(--border-color); padding: 15px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            border-radius: 10px;
        }
        button.tool-btn:hover { background: var(--text-color); color: var(--bg-color); box-shadow: var(--shadow); }
        button.tool-btn:active { transform: scale(0.9); }

        .result-box { 
            margin-top: 25px; white-space: pre-wrap; 
            background: #000; color: #00ff00; /* 結果框強制維持黑客綠才有Feel */
            padding: 20px; border: 1px solid var(--border-color);
            font-size: 1.2rem; border-radius: 10px; min-height: 120px;
        }
        .light-mode .result-box { background: #f0f0f0; color: #800080; }

        /* 側邊選單 */
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: var(--box-bg); border-left: 3px solid var(--border-color);
            z-index: 1000; padding: 60px 25px;
        }
        .sidebar.active { right: 0; }
        .sidebar h3 { color: var(--text-color); opacity: 0.7; font-size: 0.9rem; margin-top: 30px; }
        .sidebar-link {
            display: block; color: var(--text-color); text-decoration: none;
            font-size: 1.4rem; margin: 15px 0; font-weight: bold;
        }

        /* 園遊會 */
        .fair-container { text-align: center; padding: 40px 10px; }
        .fair-title { font-size: 3rem; font-weight: 900; animation: shake 0.5s infinite; }
        @keyframes shake { 0% {transform: rotate(1deg)} 50% {transform: rotate(-1deg)} 100% {transform: rotate(1deg)} }
        
        .ig-link {
            display: inline-block; margin-top: 30px; padding: 15px 30px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white; text-decoration: none; border-radius: 50px;
            font-size: 1.5rem; font-weight: bold; transition: 0.5s;
        }
        .ig-link:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,0,0,0.5); }

        .footer { font-size: 2.5rem; font-weight: 900; text-align: center; margin-top: 50px; }
    </style>
</head>
<body class="">

    <header>
        <h1 id="header-title">Cipher Tool</h1>
        <div class="nav-controls">
            <button class="icon-btn" onclick="toggleTheme()">🌓</button>
            <button class="icon-btn" onclick="toggleSidebar()">☰</button>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <button class="icon-btn" style="position:absolute; top:15px; left:15px;" onclick="toggleSidebar()">✕</button>
        
        <h3>CLASSIFIED</h3>
        <a href="#" class="sidebar-link" onclick="showSection('classic')">古密碼</a>
        <a href="#" class="sidebar-link" onclick="showSection('modern')">現代密碼</a>
        
        <h3>EVENT</h3>
        <a href="#" class="sidebar-link" onclick="showSection('fair')">竹商園遊會</a>
    </nav>

    <div id="main-content" class="container">
        <textarea id="input" rows="4" placeholder="請在此輸入內容..."></textarea>

        <div id="section-classic">
            <h2>古密碼 (Classical)</h2>
            <div class="btn-grid">
                <button class="tool-btn" onclick="runCaesar()">Caesar</button>
                <button class="tool-btn" onclick="runAtbash()">Atbash</button>
            </div>
        </div>

        <div id="section-modern">
            <h2>現代密碼 (Modern)</h2>
            <div class="btn-grid">
                <button class="tool-btn" onclick="runASCII()">ASCII (Dec)</button>
                <button class="tool-btn" onclick="runBase64()">Base64</button>
                <button class="tool-btn" onclick="runHex()">Hex</button>
                <button class="tool-btn" onclick="runBinary()">Binary</button>
            </div>
        </div>

        <div id="output" class="result-box">Loading...</div>
        <div class="footer">承蔚老帥了</div>
    </div>

    <div id="fair-content" class="container" style="display:none;">
        <div class="fair-container">
            <div class="fair-title">5/9 記得要來<br>綜二1 喔喔⭐️⭐️⭐️</div>
            <a href="https://www.instagram.com/hccvs_da21?igsh=MWdmNHp6aTdkbTAxaQ==" target="_blank" class="ig-link">快來看看吧</a>
            <div class="footer" style="margin-top:80px;">承蔚老帥了</div>
        </div>
    </div>

    <script>
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function showSection(type) {
            toggleSidebar();
            const main = document.getElementById('main-content');
            const fair = document.getElementById('fair-content');
            const classic = document.getElementById('section-classic');
            const modern = document.getElementById('section-modern');

            if (type === 'fair') {
                main.style.display = 'none';
                fair.style.display = 'block';
                document.getElementById('header-title').innerText = '竹商園遊會';
            } else {
                main.style.display = 'block';
                fair.style.display = 'none';
                document.getElementById('header-title').innerText = 'Cipher Tool';
                classic.style.display = (type === 'classic') ? 'block' : 'none';
                modern.style.display = (type === 'modern') ? 'block' : 'none';
            }
        }

        // --- 密碼邏輯 ---

        // Caesar Brute Force
        function runCaesar() {
            let s = document.getElementById('input').value;
            let res = "Caesar Brute Force:\n";
            for (let i = 1; i < 26; i++) {
                res += i.toString().padStart(2, '0') + " | " + s.replace(/[a-zA-Z]/g, c => {
                    const b = c <= 'Z' ? 65 : 97;
                    return String.fromCharCode((c.charCodeAt(0) - b + i) % 26 + b);
                }) + "\n";
            }
            document.getElementById('output').innerText = res;
        }

        // Atbash
        function runAtbash() {
            let s = document.getElementById('input').value;
            document.getElementById('output').innerText = "Atbash Result:\n" + s.replace(/[a-zA-Z]/g, c => {
                const b = c <= 'Z' ? 65 + 90 : 97 + 122;
                return String.fromCharCode(b - c.charCodeAt(0));
            });
        }

        // ASCII Decode (修正版：數字轉文字)
        function runASCII() {
            let s = document.getElementById('input').value.trim();
            try {
                let res = s.split(/\s+/).map(n => String.fromCharCode(parseInt(n))).join('');
                document.getElementById('output').innerText = "ASCII Decode Result:\n" + res;
            } catch(e) { document.getElementById('output').innerText = "錯誤：請輸入十進位數字 (例如: 75 65)"; }
        }

        // Base64 Decode
        function runBase64() {
            let s = document.getElementById('input').value.trim();
            try {
                document.getElementById('output').innerText = "Base64 Decode:\n" + atob(s);
            } catch(e) { document.getElementById('output').innerText = "錯誤：無效的 Base64 字串"; }
        }

        // Hex Decode
        function runHex() {
            let s = document.getElementById('input').value.replace(/\s+/g, '');
            try {
                let res = "";
                for (let i = 0; i < s.length; i += 2) {
                    res += String.fromCharCode(parseInt(s.substr(i, 2), 16));
                }
                document.getElementById('output').innerText = "Hex Decode:\n" + res;
            } catch(e) { document.getElementById('output').innerText = "錯誤：無效的十六進位字串"; }
        }

        // Binary Decode
        function runBinary() {
            let s = document.getElementById('input').value.trim();
            try {
                let res = s.split(/\s+/).map(b => String.fromCharCode(parseInt(b, 2))).join('');
                document.getElementById('output').innerText = "Binary Decode:\n" + res;
            } catch(e) { document.getElementById('output').innerText = "錯誤：請輸入二進位數字 (例如: 01001011)"; }
        }
    </script>
</body>
</html>
